server {
    listen 80;
    server_name localhost;

    # Serve static Angular bundle files or fallback to index.html for SPA routing
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Redirect server errors to 50x fallback page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}